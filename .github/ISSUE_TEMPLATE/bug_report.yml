name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill this out completely so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we trigger this?
      placeholder: |
        1. Set DISPATCH_MODE=...
        2. POST /jobs/scout
        3. See error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant structlog output (redact API keys).
      render: text

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: true

  - type: dropdown
    id: dispatch_mode
    attributes:
      label: DISPATCH_MODE
      options:
        - dry_run
        - live
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have redacted all API keys and tokens from logs
          required: true
        - label: I have searched existing issues for duplicates
          required: true
